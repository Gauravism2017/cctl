<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0" y1="0" x2="300" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4c4c4"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" rx="12" fill="url(#bg)"/>
  <!-- Terminal prompt decoration -->
  <g transform="translate(40, 35)">
    <circle cx="0" cy="0" r="6" fill="#ff5f57"/>
    <circle cx="20" cy="0" r="6" fill="#febc2e"/>
    <circle cx="40" cy="0" r="6" fill="#28c840"/>
  </g>
  <!-- Logo text -->
  <text x="40" y="110" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace" font-size="64" font-weight="bold" fill="url(#text-grad)">cctl</text>
  <!-- Separator line -->
  <rect x="230" y="75" width="3" height="45" rx="1.5" fill="url(#accent)" opacity="0.6"/>
  <!-- Subtitle -->
  <text x="250" y="97" font-family="'Inter', 'SF Pro', -apple-system, Helvetica, sans-serif" font-size="18" fill="#8892b0">Claude Code Context Tool</text>
  <text x="250" y="120" font-family="'Inter', 'SF Pro', -apple-system, Helvetica, sans-serif" font-size="14" fill="#5a6380">Manage skills, rules, agents, plugins &amp; MCP servers</text>
  <!-- Right side decoration: toggle switches -->
  <g transform="translate(600, 60)">
    <!-- Toggle on -->
    <rect x="0" y="0" width="36" height="20" rx="10" fill="#28c840" opacity="0.8"/>
    <circle cx="26" cy="10" r="7" fill="white"/>
    <text x="44" y="15" font-family="monospace" font-size="12" fill="#64ffda">skills</text>
    <!-- Toggle on -->
    <rect x="0" y="28" width="36" height="20" rx="10" fill="#28c840" opacity="0.8"/>
    <circle cx="26" cy="38" r="7" fill="white"/>
    <text x="44" y="43" font-family="monospace" font-size="12" fill="#64ffda">agents</text>
    <!-- Toggle off -->
    <rect x="0" y="56" width="36" height="20" rx="10" fill="#444" opacity="0.6"/>
    <circle cx="10" cy="66" r="7" fill="#888"/>
    <text x="44" y="71" font-family="monospace" font-size="12" fill="#5a6380">plugins</text>
    <!-- Toggle on -->
    <rect x="0" y="84" width="36" height="20" rx="10" fill="#28c840" opacity="0.8"/>
    <circle cx="26" cy="94" r="7" fill="white"/>
    <text x="44" y="99" font-family="monospace" font-size="12" fill="#64ffda">mcp</text>
  </g>
  <!-- Bottom bar -->
  <rect x="0" y="175" width="800" height="25" rx="0" fill="#0f0f1a"/>
  <rect x="0" y="187" width="800" height="13" rx="0 0 12 12" fill="#0f0f1a"/>
  <text x="40" y="193" font-family="monospace" font-size="11" fill="#5a6380">$ cctl launch -p web-dev</text>
  <text x="340" y="193" font-family="monospace" font-size="11" fill="#28c840">Profile "web-dev" loaded: 12 changes</text>
</svg>
